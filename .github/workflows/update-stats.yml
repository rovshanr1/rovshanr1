name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    
    # ÖNEMLİ: Sanal makinenin repository'ye dosya (commit) yazabilmesi için gerekli izin.
    permissions:
      contents: write
    
    steps:
      # 1. Adım: Repository'deki kodlarımızı sanal makineye çekiyoruz.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Adım: Bağımsız Action ile istatistikleri doğrudan sanal makinede üretme
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Baku
          plugin_languages: yes

      # 3. Adım: Oluşan yeni SVG dosyasını main branch'ine kalıcı olarak kaydetme
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Static GitHub statistics have been updated."
